name: Build ARM
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm32v7/ubuntu:16.04 \
            bash -c "
              apt-get update &&
              apt-get install -y gcc make libsdl2-dev wget &&
              wget https://github.com/Kitware/CMake/releases/download/v3.25.0/cmake-3.25.0-linux-armv7l.sh &&
              chmod +x cmake-3.25.0-linux-armv7l.sh &&
              ./cmake-3.25.0-linux-armv7l.sh --skip-license --prefix=/usr/local &&
              mkdir -p build && cd build &&
              /usr/local/bin/cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_SDL2_MIXER=0 -DENABLE_SDL2_NET=0 &&
              make -j2 chocolate-doom &&
              mkdir -p /src/libs &&
              ldd /src/build/src/chocolate-doom | grep '=>' | awk '{print \$3}' | xargs -I{} cp {} /src/libs/
            "

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chocolate-doom-armhf
          path: |
            build/src/chocolate-doom
            libs/
