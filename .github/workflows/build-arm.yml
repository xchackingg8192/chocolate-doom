name: Build ARM
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm32v7/alpine:3.18 \
            sh -c "
              apk add --no-cache gcc cmake make musl-dev sdl2-dev sdl2-static &&
              mkdir -p build && cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_SDL2_MIXER=0 -DENABLE_SDL2_NET=0 -DCMAKE_EXE_LINKER_FLAGS='-static' &&
              make -j2 chocolate-doom
            "

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chocolate-doom-armhf
          path: build/src/chocolate-doom
