name: Build ARM
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm32v7/ubuntu:22.04 \
            bash -c "
              apt-get update &&
              apt-get install -y gcc cmake make libsdl2-dev libsdl2-mixer-dev libsdl2-net-dev &&
              mkdir -p build && cd build &&
              cmake .. &&
              make -j2
            "

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: chocolate-doom-armhf
          path: build/src/chocolate-doom
